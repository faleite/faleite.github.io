            })(() => window.markmap,null,{"content":"<em><strong>CPP 00</strong></em>","children":[{"content":"<strong>Readme</strong>","children":[{"content":"<strong>Introduction:</strong>","children":[{"content":"C++ é uma linguagem de programação de uso geral criada por Bjarne Stroustrup como uma extensão da linguagem de programação C, ou \"C com Classes\" <a href=\"https://en.wikipedia.org/wiki/C++\">wikipedia</a>.<br>\n<br>\nO objetivo desses módulos é apresentar a <strong>Programação Orientada a Objetos</strong>. Este será o ponto de partida de sua jornada em C++. Muitas linguagens são recomendadas para aprender OOP. Decidimos escolher C++ porque ele é derivado do seu velho amigo C. Por ser uma linguagem complexa e para manter as coisas simples, seu código estará em conformidade com o padrão C<ins>98.<br>\nEstamos cientes de que o C</ins> moderno é muito diferente em muitos aspectos. Portanto, se você deseja se tornar um desenvolvedor C++ proficiente, cabe a você ir além após o 42 Common Core!<br>\n<br>\nVocê descobrirá novos conceitos passo a passo. Os exercícios aumentarão progressivamente em complexidade.","children":[],"payload":{"lines":"6,12"}}],"payload":{"lines":"5,12","fold":1}},{"content":"<strong>General rules:</strong>","children":[{"content":"Compile seu código com: <code>g++ -Wall -Wextra -Werror -std=c++98</code><br>\n<br>\nFormato <strong>UpperCamelCase</strong>: Arquivos contendo código de classe serão sempre nomeado de acordo com o nome da classe. Por exemplo: <code>ClassName.hpp/ClassName.h, ClassName.cpp ou ClassName.tpp</code>.<br>\nEntão, se você tem um arquivo de cabeçalho contendo a definição de uma classe \"BrickWall\" que representa um parede de tijolos, seu nome será BrickWall.hpp.<br>\n<br>\nA menos que especificado de outra forma, todas as mensagens de saída devem ser finalizadas com uma nova linha caractere e exibido na saída padrão.<br>\n<br>\n<strong>Adeus Norminette!</strong> Nenhum estilo de codificação é imposto nos módulos C++.<br>\n<br>\nVocê tem permissão para usar quase tudo da biblioteca padrão.<br>\n<br>\nVocê não pode usar nenhuma outra biblioteca externa. C++ 11 (e derivadas) e bibliotecas Boost são proibidas. As seguintes funções também são proibidas: *<strong>printf(), <em>alloc() e free()</em></strong>.<br>\n<br>\nA menos que seja explicitamente declarado o contrário, o uso de <em>namespace</em> <code>&lt;ns_name&gt;</code> e friend keywords amigo são proibidos.<br>\n<br>\n<strong>É permitido utilizar o STL somente nos Módulos 08 e 09</strong>. Isso significa: nenhum <strong>Contêiner</strong> (vector/list/map/ e assim por diante) e nenhum <strong>algoritmo</strong> (qualquer coisa que exija a inclusão do cabeçalho <code>&lt;algorithm&gt;</code>) até então.<br>\n<strong>Alguns requisitos de design</strong><br>\n<br>\nO vazamento de memória também ocorre em C++. Ao alocar memória (usando a palavra-chave <strong>new</strong>), você deve evitar <strong>memory leaks</strong>.<br>\n<br>\nDo Módulo 02 ao Módulo 09, suas classes deverão ser elaboradas na <strong>Forma Canônica Ortodoxa</strong>, <em><strong>exceto quando explicitamente indicado o contrário</strong></em>.<br>\n<br>\nQualquer implementação de função colocada em um arquivo de cabeçalho (exceto modelos de função) significa 0 para o exercício.<br>\n<br>\nVocê deve ser capaz de usar cada um dos seus cabeçalhos independentemente dos outros. Assim, eles devem incluir todas as dependências de que necessitam. No entanto, você eve evitar o problema de dupla inclusão adicionando <strong>include guards</strong> Caso contrário, sua nota será 0.<br>\n<br>\n<strong>Read me</strong><br>\n<br>\nVocê pode adicionar alguns arquivos adicionais se precisar (ou seja, para dividir seu código). Como essas atribuições não são verificadas por um programa, fique à vontade para fazê-lo, desde que entregue os arquivos obrigatórios.<br>\n<br>\nÀs vezes, as diretrizes de um exercício parecem curtas, mas os exemplos podem mostrar requisitos que não estão explicitamente escritos nas instruções.<br>\n<br>\nLeia cada módulo completamente antes de começar! Realmente, faça isso.<br>\n<br>\n<em>Você terá que implementar muitas classes. Isso pode parecer tedioso, a menos que você consiga criar o script do seu editor de texto favorito.</em><br>\n<br>\nVocê tem uma certa liberdade para completar os exercícios. Porém, siga as regras obrigatórias e não seja preguiçoso. Você perderia muitas informações úteis! Não hesite em ler sobre conceitos teóricos.","children":[],"payload":{"lines":"13,51"}}],"payload":{"lines":"12,51","fold":1}}],"payload":{"lines":"3,4","fold":2}},{"content":"<strong>Namespaces</strong>","children":[],"payload":{"lines":"51,52"}},{"content":"<strong>classes</strong>","children":[],"payload":{"lines":"52,53"}},{"content":"<strong>member</strong>","children":[],"payload":{"lines":"53,54"}},{"content":"<strong>functions</strong>","children":[],"payload":{"lines":"54,55"}},{"content":"<strong>stdio streams</strong>","children":[],"payload":{"lines":"55,56"}},{"content":"<strong>initialization lists</strong>","children":[],"payload":{"lines":"56,57"}},{"content":"<strong>static and const</strong>","children":[],"payload":{"lines":"57,58"}},{"content":"<strong>references</strong>","children":[{"content":"<a href=\"https://github.com/qingqingqingli/CPP/wiki\">Wiki</a>","children":[],"payload":{"lines":"59,60"}},{"content":"<a href=\"https://github.com/pin3dev/42_CPP_Modules_00-04\">Modules 00-04</a>","children":[],"payload":{"lines":"60,61"}},{"content":"<a href=\"https://github.com/paulahemsi/piscine_cpp\">piscine CPP</a>","children":[],"payload":{"lines":"61,64"}}],"payload":{"lines":"58,59"}}],"payload":{"lines":"1,2"}},{"colorFreezeLevel":3,"maxWidth":720,"initialExpandLevel":-1})</script>
